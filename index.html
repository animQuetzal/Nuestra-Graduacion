<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Graduación</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            font-family: 'Arial', sans-serif;
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LIENZO VIRTUAL DEL CELULAR */
        .canvas-celular {
            max-width: 450px;
            width: 100%;
            position: relative;
            box-sizing: border-box;
            background-color: #FFFFFF; /* Cambia a tu imagen de fondo cuando la tengas lista */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }

        h1 {
            color: #D4AF37; /* Letras Doradas */
            font-size: 2.3rem;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CONTENEDOR PARA TU VIDEO DE MOHO */
        .video-portada {
            width: 90%;
            max-width: 350px;
            border-radius: 15px; /* Bordes suaves para tu animación */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 15px 0;
            z-index: 2;
        }

        /* CONTENEDOR DEL RELOJ REGRESIVO */
        .contenedor-reloj {
            width: 90%;
            background: #111111; 
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            z-index: 3;
        }

        .time-box {
            color: #D4AF37;
        }

        .time-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .time-box label {
            color: #FFFFFF;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .info-evento {
            background: rgba(245, 245, 245, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 1rem;
            width: 85%;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .btn {
            display: block;
            background-color: #D4AF37;
            color: #FFFFFF;
            text-decoration: none;
            padding: 15px;
            margin: 12px 0;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            width: 85%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-whatsapp {
            background-color: #25D366;
        }
    </style>
</head>
<body>

    <div class="canvas-celular">
        
        <h1>Ceremonia de<br>Graduación</h1>
        
        <video class="video-portada" autoplay loop muted playsinline>
            <source src="portada.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>

        <div id="countdown" class="contenedor-reloj">
            <div class="time-box"><span id="days">00</span><label>Días</label></div>
            <div class="time-box"><span id="hours">00</span><label>Horas</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Min</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Seg</label></div>
        </div>

        <div class="info-evento">
            <p><strong>Escuela Telesecundaria Elvira Cabañez</strong><br>Generación 2023 - 2026</p>
            <p>Viernes 26 de Junio de 2026<br>Horario: 09:00 A.M.</p>
        </div>

        <a href="https://wa.me/1234567890?text=Hola!%20Confirmo%20mi%20asistencia%20a%20la%20graduación." target="_blank" class="btn btn-whatsapp">
            📩 Confirmar por WhatsApp
        </a>

        <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Ceremonia+de+Graduación&dates=20260626T090000/20260626T120000" target="_blank" class="btn">
            🗓️ Agendar Evento
        </a>

    </div>

    <script>
        // Reloj programado al viernes 26 de junio de 2026 a las 9:00 AM
        const targetDate = new Date("June 26, 2026 09:00:00").getTime();
        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (difference < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<p style='color:#D4AF37; font-weight:bold;'>¡EL EVENTO HA COMENZADO!</p>";
            }
        }, 1000);
    </script>
</body>
</html>
